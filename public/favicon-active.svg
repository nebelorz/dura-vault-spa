<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <defs>
    <filter id="solid-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feFlood flood-color="#34d398" flood-opacity="0.5" result="glowColor"/>
      <feComposite in="glowColor" in2="coloredBlur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>
  <path 
    d="M9 6h7c7 0 9 4.5 9 10s-2 10-9 10H9V6zm4 4v12h3c4 0 5-2.5 5-6s-1-6-5-6h-3z" 
    fill="#34d398" 
    filter="url(#solid-glow)"
  />
</svg>
