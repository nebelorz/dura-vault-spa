<div class="stats-panel">
  <h3 class="stats-title text-label">{{ chartTitle() }}</h3>

  @if (loading()) {
    <div class="chart-placeholder">
      <app-loading-status />
    </div>
  } @else if (vocationChartData(); as chartData) {
    <div class="chart-wrapper animation-fade" [style.height]="chartHeight()">
      <p-chart type="bar" [data]="chartData" [options]="vocationChartOptions()" />
    </div>
  } @else {
    <app-no-data-status />
  }
</div>
