<div class="changelog">
  @for (entry of entries(); track entry.date; let i = $index) {
    <div class="changelog-entry" [class.expanded]="isExpanded(i)">
      <!-- Card -->
      <div class="changelog-card">
        <div class="changelog-header" (click)="toggleEntry(i)">
          <div class="header-left">
            <i class="entry-type-icon" [ngClass]="getTypeIcon(entry.entryType)"></i>
            <span class="entry-title">{{ entry.title }}</span>
            @if (entry.tags?.length) {
              <div class="entry-tags">
                @for (tag of entry.tags!; track tag.label) {
                  <span class="entry-tag" [class]="'tag-' + (tag.color ?? 'primary')">{{
                    tag.label
                  }}</span>
                }
              </div>
            }
          </div>
          <div class="header-right">
            <span class="entry-date">{{ entry.date | date: 'dd MMM yyyy' }}</span>
            <i class="pi pi-chevron-down chevron"></i>
          </div>
        </div>

        <div class="changelog-body">
          <div [innerHTML]="getHtml(entry.body)"></div>
        </div>
      </div>
    </div>
  }
</div>
