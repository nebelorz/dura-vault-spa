<p-contextMenu #cm [model]="contextMenuItems" appendTo="body" />

<app-podium-list
  [items]="displayItems()"
  [loading]="loading()"
  emptyMessage="No online activity data for this period."
  [hideOverlay]="true"
  [disablePodium]="hasFilter()"
  (filterChange)="onFilterChange($event)"
  (itemClick)="onItemClick($event)"
  (itemRightClick)="onItemRightClick($event)"
/>
