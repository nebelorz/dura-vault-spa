@if (loading()) {
  <app-loading-status />
} @else {
  @if (stats(); as s) {
    <div class="stats-row animation-fade">
      <app-stat-card
        icon="pi pi-star-fill"
        [value]="s.topVocation ? s.topVocation.name : '—'"
        label="Most Active Vocation"
        [tooltip]="s.topVocation ? s.topVocation.hoursDisplay + ' total hours' : 'No data'"
        [muted]="!s.topVocation"
      />
      <app-stat-card
        icon="pi pi-chart-bar"
        [value]="s.topLevelBracket ? s.topLevelBracket.label : '—'"
        label="Most Active Level Range"
        [muted]="!s.topLevelBracket"
      />
      <app-stat-card
        icon="pi pi-calendar"
        [value]="s.peakDay ? s.peakDay.date : '—'"
        label="Most Active Day"
        [tooltip]="s.peakDay ? s.peakDay.hoursDisplay + ' total hours' : 'No data'"
        [muted]="!s.peakDay"
      />
    </div>
  }

  @if (vocationChartData(); as vData) {
    <section class="chart-section animation-fade">
      <div class="chart-title text-label">Activity by Vocation</div>
      <div class="chart-container chart-container--hbar">
        <p-chart type="bar" [data]="vData" [options]="vocationChartOptions()" />
      </div>
    </section>
  }

  @if (levelChartData(); as lData) {
    <section class="chart-section animation-fade">
      <div class="chart-title text-label">Activity by Level Range</div>
      <div class="chart-container" [style.height]="levelChartHeight()">
        <p-chart type="bar" [data]="lData" [options]="levelChartOptions()" />
      </div>
    </section>
  }

  @if (timelineChartData(); as tData) {
    <section class="chart-section animation-fade">
      <div class="chart-title text-label">Activity by Period</div>
      <div class="chart-container">
        <p-chart type="line" [data]="tData" [options]="timelineChartOptions()" />
      </div>
    </section>
  }
}
