<div class="player-detail-container animation-fade">
  <div class="player-container">
    <!-- TOP: name + section + period -->
    <div class="player-container-top">
      <app-player-detail-header
        [playerName]="playerName()"
        [vocation]="vocation()"
      />
      <div class="period-selector-wrapper">
        <app-period-selector
          [disabledPeriods]="['day']"
          [selectedPeriod]="selectedPeriod()"
          [displayInfoIcon]="true"
          [periodOptions]="periodOptions"
          (periodChange)="onPeriodChange($event)"
        />
        <app-minimalist-icon
          size="x-small"
          tooltipText="Averages are spread over the full period window, not just active days — inactive days lower the daily average."
          tooltipPosition="left"
        />
      </div>
    </div>

    <!-- BODY -->
    <div class="player-container-body">
      <!-- Left: player stats + online stats -->
      <div class="player-left-column">
        <app-player-stats-card
          [stats]="playerStats()"
          [loading]="loading()"
          [activeSection]="section()"
          (sectionSelect)="onSectionChange($event)"
        />
        <div class="left-divider"></div>
        <app-player-online-stats-summary
          [onlineSummary]="playerOnlineData()?.summary ?? null"
          [summary]="summary()"
        />
      </div>

      <!-- Right: performance panel wrapping chart via ng-content -->
      <div class="player-right-column">
        <app-player-performance-summary
          class="animation-fade"
          [summary]="summary()"
          [section]="section()"
        >
          <app-player-detail-chart
            [playerDetailsData]="playerDetailsData()"
            [loading]="loading()"
          />
        </app-player-performance-summary>
      </div>
    </div>
  </div>
</div>
