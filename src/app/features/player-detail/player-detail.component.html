<div class="player-detail-container animation-fade">
  <div class="player-container">
    <!-- TOP: name + period selector -->
    <div class="player-container-top">
      <app-player-detail-header [playerName]="playerName()" [vocation]="vocation()" />
      <div class="period-selector-wrapper">
        <div class="selector-row">
          <app-period-selector
            [disabledPeriods]="['day']"
            [selectedPeriod]="selectedPeriod()"
            [displayInfoIcon]="true"
            [periodOptions]="periodOptions"
            (periodChange)="onPeriodChange($event)"
          />
          <app-minimalist-icon
            [tooltipText]="
              'Averages are spread over the full period window, not just active days.\n\n Inactive days lower the daily average.'
            "
            tooltipPosition="left"
          />
        </div>
        @if (dateRange().length === 1) {
          <span class="text-additional-info">{{ dateRange()[0] | date: 'dd MMM yyyy' }}</span>
        } @else if (dateRange().length > 1) {
          <span class="text-additional-info"
            >{{ dateRange()[0] | date: 'dd MMM yyyy' }} —
            {{ dateRange()[1] | date: 'dd MMM yyyy' }}</span
          >
        }
      </div>
    </div>

    <!-- BODY: column with player stats + online summary & tabbed right panel -->
    <div class="player-container-body">
      <div class="player-left-column">
        <div class="left-stats-section">
          <app-player-stats
            [stats]="playerStats()"
            [loading]="loading()"
            [activeSection]="section()"
            (sectionSelect)="onSectionChange($event)"
          />
        </div>
        <div class="left-online-section">
          <app-player-online-stats
            [loading]="loading()"
            [onlineSummary]="playerOnlineData()?.summary ?? null"
            [lastLogin]="lastLogin()"
          />
        </div>
        <div class="left-records-section">
          <div class="section-header">RECORDS</div>
          <app-player-records [summary]="summary()" [section]="section()" [loading]="loading()" />
        </div>
      </div>

      <div class="player-right-column">
        <p-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
          <p-tablist>
            <p-tab [value]="characterTab">
              Character
              <app-minimalist-icon
                class="tab-info-icon"
                [tooltipText]="'Contains live data from the Dura website.'"
                tooltipPosition="bottom"
              />
            </p-tab>
            <p-tab [value]="performanceTab">
              Performance
              <app-minimalist-icon
                class="tab-info-icon"
                [tooltipText]="'Contains data from the vault.'"
                tooltipPosition="bottom"
              />
            </p-tab>
          </p-tablist>
          <p-tabpanels>
            <p-tabpanel [value]="characterTab">
              <app-player-detail-tab-character
                class="animation-fade"
                [profile]="characterProfile()"
                [profileLoading]="profileLoading()"
              />
            </p-tabpanel>
            <p-tabpanel [value]="performanceTab">
              <app-player-detail-tab-performance
                class="animation-fade"
                [playerDetailsData]="playerDetailsData()"
                [summary]="summary()"
                [section]="section()"
                [loading]="loading()"
              />
            </p-tabpanel>
          </p-tabpanels>
        </p-tabs>
      </div>
    </div>
  </div>
</div>
