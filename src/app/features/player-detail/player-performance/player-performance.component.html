@if (summary()) {
  <div class="perf-cards">
    <div class="perf-card">
      <div class="section-header">GAINS</div>
      <app-player-gains-panel [summary]="summary()" [section]="section()" />
    </div>
    <div class="perf-card">
      <div class="section-header">PERSONAL BEST</div>
      <app-player-personal-score-panel [summary]="summary()" [section]="section()" />
    </div>
    <div class="perf-card">
      <div class="section-header">PROJECTION</div>
      <app-player-projected-panel [summary]="summary()" />
    </div>
  </div>
}
<div class="chart-slot">
  <app-player-detail-chart [playerDetailsData]="playerDetailsData()" [loading]="loading()" />
</div>
