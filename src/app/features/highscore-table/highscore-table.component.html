<div class="highscore-container animation-fade">
  <!-- Header -->
  <div class="highscore-header">
    <app-highscore-header [section]="section()" />

    <div class="selector-group">
      <app-period-selector
        [selectedPeriod]="selectedPeriod()"
        (periodChange)="onPeriodChange($event)"
      />
      @if (dateRange().length === 1) {
        <span class="text-additional-info">{{ dateRange()[0] | date: 'dd MMM yyyy' }}</span>
      } @else if (dateRange().length > 1) {
        <span class="text-additional-info"
          >{{ dateRange()[0] | date: 'dd MMM yyyy' }} —
          {{ dateRange()[1] | date: 'dd MMM yyyy' }}</span
        >
      }
    </div>
  </div>

  <!-- Body: left (ranking) | right (stats + charts) -->
  <div class="highscore-body">
    <div class="highscore-left">
      <app-highscore-data-table [data]="data()" [loading]="loading()" [section]="section()" />
    </div>
    <div class="highscore-right">
      <app-highscore-stats [data]="data()" [loading]="loading()" [section]="section()" />
    </div>
  </div>
</div>
