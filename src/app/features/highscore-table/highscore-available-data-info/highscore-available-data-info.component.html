@if (availableDateRange()) {
  <div>
    <span
      class="animation-fade additional-info"
      pTooltip="New data is available shortly after server save"
      tooltipPosition="right"
    >
      <app-minimalist-icon />
      The vault displays data from
      {{ availableDateRange()!.min_scrape_date | date: 'dd MMM yyyy' }} to
      {{ availableDateRange()!.active_comparison_date | date: 'dd MMM yyyy' }}
    </span>
  </div>
}
