<h3 class="voc-title text-label">Top By Vocation</h3>
@if (loading()) {
  <app-loading-status />
} @else if (items().length) {
  <div class="voc-grid animation-fade">
    @for (item of items(); track item.group) {
      <app-stat-card
        [value]="item.name"
        [label]="item.group"
        [sublabel]="item.gainDisplay"
        [sublabelColor]="metricColor()"
        [link]="item.link"
        [queryParams]="queryParams()"
      />
    }
  </div>
}
